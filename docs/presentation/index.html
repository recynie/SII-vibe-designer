<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Vibe Design · 项目介绍</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0D1B2A;overflow:hidden;font-family:system-ui}
  .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  iframe{display:block;border:none;background:#F8F9FA;box-shadow:0 24px 64px rgba(0,0,0,0.4);
    transform-origin:center;}
  .controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.95);padding:10px 24px;border-radius:32px;
    font-family:'JetBrains Mono',monospace;font-size:13px;color:#0D1B2A;
    display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(0,0,0,0.25);
    backdrop-filter:blur(8px);}
  .controls button{background:transparent;border:1px solid #0D1B2A;color:#0D1B2A;
    padding:5px 14px;cursor:pointer;font:inherit;border-radius:16px;transition:all 0.15s;}
  .controls button:hover{background:#0D1B2A;color:white;}
  .num{color:#00B4D8;font-weight:700;}
  .slide-title{opacity:0.5;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<div class="stage">
  <iframe id="frame" src="01-title.html"></iframe>
</div>
<div class="controls">
  <button onclick="prev()">◀</button>
  <span><span class="num" id="cur">1</span> / <span id="total">5</span></span>
  <button onclick="next()">▶</button>
  <span class="slide-title" id="slideTitle"></span>
  <span style="opacity:0.4;font-size:11px">← → 翻页 · F 全屏</span>
</div>
<script>
  const slides = [
    {src:'01-title.html', title:'项目概览'},
    {src:'02-architecture.html', title:'系统架构'},
    {src:'03-dataflow.html', title:'数据流与迭代'},
    {src:'04-decisions.html', title:'关键设计决策'},
    {src:'05-demo.html', title:'实跑 Demo'},
  ];
  let idx = 0;
  const frame = document.getElementById('frame');
  const cur = document.getElementById('cur');
  const slideTitle = document.getElementById('slideTitle');
  document.getElementById('total').textContent = slides.length;

  function fit() {
    const sw = window.innerWidth, sh = window.innerHeight - 60;
    const scale = Math.min(sw / 1920, sh / 1080) * 0.95;
    frame.style.width = '1920px';
    frame.style.height = '1080px';
    frame.style.transform = `scale(${scale})`;
  }

  function go(i) {
    idx = (i + slides.length) % slides.length;
    frame.src = slides[idx].src;
    cur.textContent = idx + 1;
    slideTitle.textContent = slides[idx].title;
    location.hash = idx + 1;
  }

  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') next();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen();
  });

  if (location.hash) go(parseInt(location.hash.slice(1)) - 1);
  fit();
  window.addEventListener('resize', fit);
  slideTitle.textContent = slides[0].title;
</script>
</body>
</html>
