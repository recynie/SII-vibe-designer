<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Vibe Design · 答辩 PPT</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0A2463;overflow:hidden;font-family:system-ui}
  .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  iframe{display:block;border:none;background:#F8F9FA;box-shadow:0 24px 64px rgba(0,0,0,0.4);
    transform-origin:center;}
  .controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(255,255,255,0.92);padding:10px 20px;border-radius:32px;
    font-family:'JetBrains Mono',monospace;font-size:13px;color:#0A2463;
    display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
  .controls button{background:transparent;border:1px solid #0A2463;color:#0A2463;
    padding:4px 12px;cursor:pointer;font:inherit;border-radius:16px;}
  .controls button:hover{background:#0A2463;color:white;}
  .num{color:#FF6B35;font-weight:700;}
</style>
</head>
<body>
<div class="stage">
  <iframe id="frame" src="01-architecture.html"></iframe>
</div>
<div class="controls">
  <button onclick="prev()">◀ 上一页</button>
  <span><span class="num" id="cur">1</span> / <span id="total">3</span></span>
  <button onclick="next()">下一页 ▶</button>
  <span style="opacity:0.6">←/→ 翻页 · F 全屏</span>
</div>
<script>
  const slides = ['01-architecture.html', '02-sequence.html', '03-demo.html'];
  let idx = 0;
  const frame = document.getElementById('frame');
  const cur = document.getElementById('cur');
  document.getElementById('total').textContent = slides.length;

  function fit() {
    const sw = window.innerWidth, sh = window.innerHeight - 60;
    const scale = Math.min(sw / 1920, sh / 1080) * 0.95;
    frame.style.width = '1920px';
    frame.style.height = '1080px';
    frame.style.transform = `scale(${scale})`;
  }

  function go(i) {
    idx = (i + slides.length) % slides.length;
    frame.src = slides[idx];
    cur.textContent = idx + 1;
    location.hash = idx + 1;
  }

  function next(){ go(idx + 1); }
  function prev(){ go(idx - 1); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') next();
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'f' || e.key === 'F') document.documentElement.requestFullscreen();
  });

  if (location.hash) go(parseInt(location.hash.slice(1)) - 1);
  fit();
  window.addEventListener('resize', fit);
</script>
</body>
</html>
