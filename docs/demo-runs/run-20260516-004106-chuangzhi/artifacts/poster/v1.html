<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>主视觉 · 创智学院</title>
<!--
  设计依据：
  - 主色 #1A2B4A：来自 brand-spec.md Primary，学术稳重
  - 强调色 #00B8A9：青绿点缀，象征 AI 活力
  - 字体配对：思源黑体 Heavy（标题）+ Regular（正文）
  - 版式参考：Pentagram 信息建筑派 - 几何精准、留白克制
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  :root {
    --primary: #1A2B4A;
    --secondary: #2D3E5F;
    --bg: #F7F9FC;
    --ink: #1A1A1A;
    --accent: #00B8A9;
  }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 628px;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans SC', system-ui, sans-serif;
    display: grid;
    grid-template-columns: 1fr 480px;
    box-sizing: border-box;
    overflow: hidden;
  }
  /* 左侧文字区 */
  .content {
    padding: 80px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  .logo-mark {
    width: 48px;
    height: 48px;
    background: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }
  .logo-mark svg {
    width: 28px;
    height: 28px;
  }
  .display {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--primary);
    margin: 0 0 24px 0;
  }
  .slogan {
    font-size: 22px;
    font-weight: 700;
    color: var(--secondary);
    margin: 0 0 16px 0;
    letter-spacing: 0.05em;
  }
  .desc {
    font-size: 15px;
    font-weight: 400;
    color: var(--secondary);
    line-height: 1.7;
    max-width: 420px;
    margin: 0;
  }
  .accent-line {
    width: 60px;
    height: 4px;
    background: var(--accent);
    margin-top: 32px;
  }
  /* 右侧几何区 */
  .visual {
    position: relative;
    background: var(--primary);
    overflow: hidden;
  }
  .visual-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
    mix-blend-mode: multiply;
  }
  /* 几何装饰元素 */
  .geo-shape {
    position: absolute;
    border: 2px solid var(--accent);
    opacity: 0.6;
  }
  .geo-1 {
    width: 200px;
    height: 200px;
    top: -30px;
    right: -30px;
    transform: rotate(45deg);
  }
  .geo-2 {
    width: 120px;
    height: 120px;
    bottom: 80px;
    right: 60px;
    border-radius: 0;
  }
  .geo-3 {
    width: 80px;
    height: 80px;
    bottom: -20px;
    left: 40px;
    border-color: rgba(255,255,255,0.3);
  }
  .geo-4 {
    width: 300px;
    height: 2px;
    top: 100px;
    right: 0;
    background: var(--accent);
    transform: rotate(-15deg);
    opacity: 0.4;
  }
  /* 底部信息 */
  .footer-info {
    position: absolute;
    bottom: 24px;
    left: 60px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#00B8A9"/>
        <path d="M2 17L12 22L22 17" stroke="#00B8A9" stroke-width="2"/>
        <path d="M2 12L12 17L22 12" stroke="#00B8A9" stroke-width="2"/>
      </svg>
    </div>
    <h1 class="display">创智学院</h1>
    <p class="slogan">AI 创新与人才培养</p>
    <p class="desc">上海专注于人工智能前沿研究、青年研究者与工程师培养的研究型机构，融合研究院与高等教育双重使命。</p>
    <div class="accent-line"></div>
  </div>
  <div class="visual">
    <img src="bg-abstract.png" class="visual-bg" alt="">
    <div class="geo-shape geo-1"></div>
    <div class="geo-shape geo-2"></div>
    <div class="geo-shape geo-3"></div>
    <div class="geo-shape geo-4"></div>
    <div class="footer-info">CHUANGZHI ACADEMY</div>
  </div>
</body>
</html>
