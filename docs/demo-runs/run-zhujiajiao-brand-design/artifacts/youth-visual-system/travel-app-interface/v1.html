<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>朱家角旅游 APP 界面</title>
  <style>
    :root {
      --bg: #eff3ef;
      --card: rgba(255,255,255,0.78);
      --card-strong: rgba(245,240,232,0.94);
      --ink: #123136;
      --muted: #5a7377;
      --teal: #2b8a8f;
      --teal-deep: #0f5d66;
      --yellow: #f0c84b;
      --line: rgba(18,49,54,0.10);
    }
    html, body { margin: 0; width: 100%; height: 100%; background: #dfe8e2; font-family: 'Noto Sans SC', sans-serif; overflow: hidden; }
    .device {
      width: 390px;
      height: 844px;
      margin: 0 auto;
      background: linear-gradient(180deg, #f8fbf8 0%, var(--bg) 100%);
      position: relative;
      box-shadow: 0 24px 70px rgba(13, 35, 38, 0.16);
      overflow: hidden;
    }
    .device::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 10%, rgba(240,200,75,0.14), transparent 18%), radial-gradient(circle at 18% 82%, rgba(43,138,143,0.10), transparent 22%);
      pointer-events: none;
    }
    .topbar {
      position: relative;
      z-index: 1;
      padding: 18px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand img { width: 38px; height: 38px; object-fit: contain; border-radius: 12px; background: rgba(255,255,255,0.6); padding: 4px; }
    .brand .name { display: flex; flex-direction: column; line-height: 1.05; }
    .brand .name span:last-child { font-size: 12px; color: var(--teal); font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
    .hero {
      position: relative;
      z-index: 1;
      margin: 14px 14px 0;
      height: 208px;
      border-radius: 28px;
      overflow: hidden;
      background: url('../../../assets/zhujiajiao-water-town-bg.jpg') center center / cover no-repeat;
      box-shadow: 0 20px 45px rgba(10,28,30,0.10);
    }
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(17,43,47,0.58) 0%, rgba(17,43,47,0.22) 48%, rgba(17,43,47,0.02) 100%);
    }
    .hero-content {
      position: absolute;
      inset: 0;
      z-index: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #f7f2ea;
    }
    .hero-title { font-size: 30px; line-height: 1.02; font-weight: 900; letter-spacing: -0.05em; max-width: 7ch; }
    .hero-sub { font-size: 14px; line-height: 1.55; max-width: 18ch; opacity: 0.95; }
    .search {
      position: relative;
      z-index: 1;
      margin: 14px 14px 0;
      height: 48px;
      border-radius: 16px;
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(18,49,54,0.08);
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: rgba(18,49,54,0.48);
      font-size: 14px;
    }
    .quick {
      position: relative;
      z-index: 1;
      margin: 14px 14px 0;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    .pill {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(18,49,54,0.08);
      font-size: 13px;
      color: rgba(18,49,54,0.82);
      white-space: nowrap;
    }
    .section {
      position: relative;
      z-index: 1;
      margin: 16px 14px 0;
    }
    .section-head {
      display: flex; justify-content: space-between; align-items: end; margin-bottom: 10px;
      color: var(--ink);
    }
    .section-head h2 { margin: 0; font-size: 18px; line-height: 1.1; }
    .section-head .more { font-size: 12px; color: var(--teal); font-weight: 800; letter-spacing: 0.08em; }
    .cards { display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(18,49,54,0.10);
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 16px 34px rgba(10,28,30,0.05);
    }
    .route-card {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .thumb {
      border-radius: 16px;
      background: url('../../../assets/zhujiajiao-scenic-card.jpg') center center / cover no-repeat;
      min-height: 108px;
      overflow: hidden;
      position: relative;
    }
    .thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(18,49,54,0.00), rgba(18,49,54,0.22));
    }
    .route-body { display: flex; flex-direction: column; justify-content: space-between; }
    .route-body .title { font-size: 17px; font-weight: 800; color: var(--ink); }
    .route-body .desc { margin-top: 4px; font-size: 13px; line-height: 1.55; color: rgba(18,49,54,0.72); }
    .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .meta {
      padding: 6px 10px; border-radius: 999px; background: rgba(43,138,143,0.08); color: var(--teal-deep);
      font-size: 12px; font-weight: 700;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mini {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(245,240,232,0.88));
    }
    .mini .label { font-size: 12px; color: rgba(18,49,54,0.54); letter-spacing: 0.10em; text-transform: uppercase; }
    .mini .value { font-size: 20px; font-weight: 900; line-height: 1.1; color: var(--ink); }
    .banner {
      margin-top: 12px;
      height: 94px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(43,138,143,0.18), rgba(240,200,75,0.16));
      border: 1px solid rgba(18,49,54,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .banner .left { color: var(--ink); }
    .banner .left .top { font-size: 12px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(18,49,54,0.58); }
    .banner .left .big { font-size: 22px; font-weight: 900; line-height: 1.05; margin-top: 4px; }
    .banner .cta { padding: 10px 14px; border-radius: 999px; background: var(--teal-deep); color: #f7f2ea; font-size: 13px; font-weight: 800; }
    .nav {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 12px 18px 14px;
      background: rgba(250,252,250,0.94);
      border-top: 1px solid rgba(18,49,54,0.08);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      z-index: 2;
    }
    .nav-item {
      text-align: center;
      color: rgba(18,49,54,0.56);
      font-size: 11px;
      line-height: 1.2;
    }
    .nav-item .icon {
      width: 28px; height: 28px; border-radius: 10px; margin: 0 auto 6px;
      background: rgba(43,138,143,0.10);
      display: grid; place-items: center; color: var(--teal-deep); font-size: 14px; font-weight: 900;
    }
    .nav-item.active { color: var(--ink); }
    .nav-item.active .icon { background: rgba(240,200,75,0.24); }
  </style>
</head>
<body>
  <main class="device">
    <div class="topbar">
      <div class="brand">
        <img src="../logo/v1.png" alt="朱家角标志" />
        <div class="name"><span>朱家角</span><span>TRAVEL APP</span></div>
      </div>
      <div>09:41</div>
    </div>

    <section class="hero">
      <div class="hero-content">
        <div class="hero-title">今天去
          <br>朱家角</div>
        <div class="hero-sub">路线、票务、导览一屏完成。以清透的水感界面承载年轻化文旅体验。</div>
      </div>
    </section>

    <div class="search">搜索景点 / 路线 / 美食 / 游船</div>

    <div class="quick">
      <div class="pill">今日推荐</div>
      <div class="pill">门票导览</div>
      <div class="pill">夜游朱家角</div>
      <div class="pill">亲子路线</div>
      <div class="pill">拍照点位</div>
    </div>

    <section class="section">
      <div class="section-head">
        <h2>热门路线</h2>
        <div class="more">VIEW ALL</div>
      </div>
      <div class="cards">
        <div class="card route-card">
          <div class="thumb"></div>
          <div class="route-body">
            <div>
              <div class="title">桥与河网慢游</div>
              <div class="desc">放生桥 — 北大街 — 游船码头，适合 2 小时轻松打卡。</div>
            </div>
            <div class="meta-row">
              <div class="meta">拍照</div>
              <div class="meta">步行</div>
              <div class="meta">1.8 km</div>
            </div>
          </div>
        </div>
        <div class="grid-2">
          <div class="card mini">
            <div class="label">Tickets</div>
            <div class="value">在线购票<br>即买即用</div>
          </div>
          <div class="card mini">
            <div class="label">Guide</div>
            <div class="value">语音导览<br>随走随听</div>
          </div>
        </div>
        <div class="card banner">
          <div class="left">
            <div class="top">Weekend special</div>
            <div class="big">年轻游客轻松出发</div>
          </div>
          <div class="cta">立即规划</div>
        </div>
      </div>
    </section>

    <nav class="nav">
      <div class="nav-item active"><div class="icon">⌂</div>首页</div>
      <div class="nav-item"><div class="icon">▦</div>路线</div>
      <div class="nav-item"><div class="icon">◌</div>票务</div>
      <div class="nav-item"><div class="icon">☺</div>我的</div>
    </nav>
  </main>
</body>
</html>
