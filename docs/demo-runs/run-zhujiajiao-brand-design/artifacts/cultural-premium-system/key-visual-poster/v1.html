<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>朱家角高端文化主视觉海报</title>
  <style>
    :root{
      --paper:#f6f1e8;
      --paper-deep:#ebe1d1;
      --ink:#14201e;
      --muted:#6f7168;
      --teal:#18332f;
      --stone:#b8ac98;
      --gold:#bda978;
      --line:rgba(24,51,47,.22);
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;min-height:100%;background:var(--paper)}
    body{font-family:"Noto Sans SC", sans-serif;color:var(--ink)}
    .poster{
      width:1200px;height:1600px;position:relative;overflow:hidden;margin:0 auto;
      background:
        radial-gradient(circle at 76% 18%, rgba(189,169,120,.20) 0 11%, transparent 12%),
        linear-gradient(180deg,#fbf8f1 0%,var(--paper) 62%,#efe7da 100%);
      padding:96px 92px 82px 92px;
    }
    .poster:before{
      content:"";position:absolute;inset:38px;border:1px solid rgba(24,51,47,.18);pointer-events:none;
    }
    .grain{position:absolute;inset:0;opacity:.34;background-image:radial-gradient(rgba(20,32,30,.08) .7px, transparent .9px);background-size:9px 9px;mix-blend-mode:multiply;pointer-events:none}
    .meta{position:absolute;left:92px;top:92px;width:82px;display:flex;gap:16px;align-items:flex-start;color:var(--teal)}
    .seal{width:56px;height:56px;border:2px solid var(--teal);display:grid;place-items:center;font-family:"Noto Serif SC", serif;font-size:21px;line-height:1.05;letter-spacing:.08em}
    .vertical{writing-mode:vertical-rl;font-size:14px;letter-spacing:.18em;line-height:1.8;color:var(--muted)}
    .headline{position:absolute;left:224px;top:118px;width:660px}
    .kicker{font-size:13px;letter-spacing:.22em;color:var(--muted);margin-bottom:34px;text-transform:uppercase}
    h1{font-family:"Noto Serif SC", serif;font-weight:600;font-size:118px;line-height:1.02;letter-spacing:-.05em;margin:0;color:var(--ink)}
    .sub{margin-top:34px;max-width:410px;font-size:18px;line-height:1.9;color:#46524e;letter-spacing:.03em}
    .landscape{position:absolute;left:92px;right:92px;top:590px;height:640px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    .water{position:absolute;left:0;right:0;bottom:0;height:184px;background:linear-gradient(180deg,transparent,rgba(24,51,47,.10));overflow:hidden}
    .ripple{position:absolute;left:70px;right:70px;height:1px;background:rgba(24,51,47,.22)}
    .r1{bottom:58px}.r2{bottom:92px;left:210px;right:170px}.r3{bottom:128px;left:0;right:330px}.r4{bottom:154px;left:420px;right:0}
    .bridge{position:absolute;left:74px;right:74px;bottom:150px;height:250px}
    .deck{position:absolute;left:0;right:0;top:70px;height:30px;background:var(--teal);border-radius:42px 42px 4px 4px;transform:skewX(-5deg)}
    .arch{position:absolute;bottom:0;width:152px;height:152px;border:24px solid var(--teal);border-bottom:0;border-radius:152px 152px 0 0;background:transparent}
    .a1{left:36px;transform:scale(.76);transform-origin:bottom}.a2{left:206px;transform:scale(.92);transform-origin:bottom}.a3{left:398px}.a4{right:206px;transform:scale(.92);transform-origin:bottom}.a5{right:36px;transform:scale(.76);transform-origin:bottom}
    .roofline{position:absolute;left:32px;right:32px;top:60px;height:240px}
    .house{position:absolute;bottom:0;width:210px;height:102px;border-left:1px solid rgba(24,51,47,.18);border-right:1px solid rgba(24,51,47,.18);background:rgba(246,241,232,.72)}
    .house:before{content:"";position:absolute;left:-18px;right:-18px;top:-32px;border-left:123px solid transparent;border-right:123px solid transparent;border-bottom:34px solid rgba(24,51,47,.82)}
    .h1{left:28px}.h2{left:258px;height:132px}.h3{right:272px;height:118px}.h4{right:36px;height:96px}
    .garden{position:absolute;right:86px;top:128px;width:222px;height:222px;border:1px solid rgba(24,51,47,.26);border-radius:50%;opacity:.9}
    .garden:before,.garden:after{content:"";position:absolute;inset:34px;border:1px solid rgba(24,51,47,.20);border-radius:50%}.garden:after{inset:78px;background:rgba(189,169,120,.14)}
    .footer{position:absolute;left:92px;right:92px;bottom:82px;display:grid;grid-template-columns:1fr 360px;gap:80px;align-items:end}
    .poem{font-family:"Noto Serif SC", serif;font-size:31px;line-height:1.75;letter-spacing:.04em;color:var(--teal);margin:0}
    .info{border-left:1px solid var(--line);padding-left:34px;color:#48504c;font-size:15px;line-height:1.9;letter-spacing:.04em}
    .info b{display:block;font-family:"Noto Serif SC", serif;font-size:26px;font-weight:600;color:var(--ink);margin-bottom:14px;letter-spacing:.02em}
  </style>
</head>
<body>
  <main class="poster">
    <div class="grain"></div>
    <section class="meta">
      <div class="seal">朱<br>角</div>
      <div class="vertical">珠溪文脉｜放生桥｜课植园</div>
    </section>
    <section class="headline">
      <div class="kicker">THE MOST JIANGNAN · CULTURAL JOURNEY</div>
      <h1>最江南<br>在朱家角</h1>
      <p class="sub">九条老街沿河蜿蜒，三十六座石桥如虹跨水。以一方水墨留白，进入明清街巷与江南园林的时间秩序。</p>
    </section>
    <section class="landscape" aria-label="放生桥与水乡意象">
      <div class="roofline"><div class="house h1"></div><div class="house h2"></div><div class="house h3"></div><div class="house h4"></div></div>
      <div class="garden"></div>
      <div class="bridge"><div class="deck"></div><div class="arch a1"></div><div class="arch a2"></div><div class="arch a3"></div><div class="arch a4"></div><div class="arch a5"></div></div>
      <div class="water"><i class="ripple r1"></i><i class="ripple r2"></i><i class="ripple r3"></i><i class="ripple r4"></i></div>
    </section>
    <footer class="footer">
      <p class="poem">桥影入水，街巷入画。<br>在古镇的慢行尺度里，重读江南。</p>
      <div class="info"><b>上海 · 朱家角古镇</b>文化导览｜水岸漫行｜园林参访<br>Fangsheng Bridge · North Street · Kezhi Garden</div>
    </footer>
  </main>
</body>
</html>
